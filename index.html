<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Statsnap - Professional Creative Editor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#1a1a2e">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image/2.6.0/dom-to-image.min.js"></script>
</head>
<body>
    <!-- Top Navigation Bar -->
    <nav id="topNav">
        <div class="nav-left">
            <button id="menuBtn" class="icon-btn" aria-label="Menu">☰</button>
            <span class="app-title">Statsnap</span>
        </div>
        <div class="nav-center">
            <div class="mode-selector">
                <button class="mode-btn active" data-mode="design">✏️ Design</button>
                <button class="mode-btn" data-mode="photo">🖼 Photo</button>
                <button class="mode-btn" data-mode="collage">🎭 Collage</button>
            </div>
        </div>
        <div class="nav-right">
            <button id="undoBtn" class="icon-btn" aria-label="Undo" disabled>↩️</button>
            <button id="redoBtn" class="icon-btn" aria-label="Redo" disabled>↪️</button>
            <button id="themeToggle" class="icon-btn" aria-label="Toggle theme">🌓</button>
        </div>
    </nav>

    <!-- Canvas Area -->
    <div id="canvasContainer">
        <div id="mainCanvas" class="canvas">
            <!-- Layers will be dynamically created here -->
        </div>
        <div id="canvasOverlay" class="canvas-overlay">
            <p id="emptyState">Tap + to add content</p>
        </div>
        <!-- Brush canvas overlay for paint/blur brushes -->
        <canvas id="brushCanvas" style="display:none; position:absolute; top:0; left:0; pointer-events:none;"></canvas>
    </div>

    <!-- Bottom Toolbar Container -->
    <div id="bottomToolbarContainer">
        <!-- Context-Aware Toolbar -->
        <div id="contextToolbar" class="toolbar">
            <!-- Default tools - Add content -->
            <div id="defaultTools" class="tool-group active">
                <button class="tool-btn" data-action="addText">
                    <span class="tool-icon">T</span>
                    <span class="tool-label">Text</span>
                </button>
                <button class="tool-btn" data-action="addImage">
                    <span class="tool-icon">🖼</span>
                    <span class="tool-label">Image</span>
                </button>
                <button class="tool-btn" data-action="addShape">
                    <span class="tool-icon">⬜</span>
                    <span class="tool-label">Shape</span>
                </button>
                <button class="tool-btn" data-action="changeBackground">
                    <span class="tool-icon">🎨</span>
                    <span class="tool-label">BG</span>
                </button>
                <button class="tool-btn" data-action="exportImage">
                    <span class="tool-icon">📤</span>
                    <span class="tool-label">Export</span>
                </button>
            </div>

            <!-- Text editing tools -->
            <div id="textTools" class="tool-group">
                <button class="tool-btn" data-action="textColor">
                    <span class="tool-icon">🌈</span>
                    <span class="tool-label">Color</span>
                </button>
                <button class="tool-btn" data-action="textBold">
                    <span class="tool-icon">𝐁</span>
                    <span class="tool-label">Bold</span>
                </button>
                <button class="tool-btn" data-action="textAlign">
                    <span class="tool-icon">≡</span>
                    <span class="tool-label">Align</span>
                </button>
                <button class="tool-btn" data-action="dropShadow">
                    <span class="tool-icon">◈</span>
                    <span class="tool-label">Shadow</span>
                </button>
                <button class="tool-btn" data-action="deleteLayer">
                    <span class="tool-icon">🗑</span>
                    <span class="tool-label">Delete</span>
                </button>
            </div>

            <!-- Image editing tools -->
            <div id="imageTools" class="tool-group">
                <button class="tool-btn" data-action="imageAdjust">
                    <span class="tool-icon">⚙️</span>
                    <span class="tool-label">Adjust</span>
                </button>
                <button class="tool-btn" data-action="imageFilter">
                    <span class="tool-icon">✨</span>
                    <span class="tool-label">Filter</span>
                </button>
                <button class="tool-btn" data-action="paintBrush">
                    <span class="tool-icon">🖌</span>
                    <span class="tool-label">Paint</span>
                </button>
                <button class="tool-btn" data-action="blurBrush">
                    <span class="tool-icon">💧</span>
                    <span class="tool-label">Blur</span>
                </button>
                <button class="tool-btn" data-action="deleteLayer">
                    <span class="tool-icon">🗑</span>
                    <span class="tool-label">Delete</span>
                </button>
            </div>

            <!-- Shape editing tools -->
            <div id="shapeTools" class="tool-group">
                <button class="tool-btn" data-action="shapeColor">
                    <span class="tool-icon">🎨</span>
                    <span class="tool-label">Fill</span>
                </button>
                <button class="tool-btn" data-action="shapeBorder">
                    <span class="tool-icon">⬚</span>
                    <span class="tool-label">Border</span>
                </button>
                <button class="tool-btn" data-action="dropShadow">
                    <span class="tool-icon">◈</span>
                    <span class="tool-label">Shadow</span>
                </button>
                <button class="tool-btn" data-action="deleteLayer">
                    <span class="tool-icon">🗑</span>
                    <span class="tool-label">Delete</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Slide-up Panel for extended controls -->
    <div id="slidePanel" class="slide-panel">
        <div class="panel-header">
            <span id="panelTitle">Settings</span>
            <button id="closePanel" class="icon-btn">✕</button>
        </div>
        <div id="panelContent" class="panel-content"></div>
    </div>

    <!-- Modal Container -->
    <div id="modalContainer"></div>

    <!-- Color Picker Popup -->
    <div id="colorPickerPopup" class="color-picker-popup" style="display:none;">
        <div class="color-grid" id="colorGrid"></div>
        <input type="color" id="customColorInput" value="#000000">
    </div>

    <script src="script.js"></script>
</body>
                                                 </html>
